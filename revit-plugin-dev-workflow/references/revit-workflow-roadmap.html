<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><title>改进路线图</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#020617;color:#fff;padding:20px}
.container{max-width:1320px;margin:0 auto}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dot{width:10px;height:10px;border-radius:50%;background:#22d3ee;animation:p 2s infinite}

h1{font-size:18px}.sub{color:#94a3b8;font-size:12px;margin-bottom:10px}
.diagram{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:12px;padding:12px;overflow-x:auto}
svg{width:100%;min-width:1180px;display:block}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.card{background:rgba(15,23,42,.5);border:1px solid #1e293b;border-radius:10px;padding:10px}
.card h3{font-size:12px;margin-bottom:6px}
.card ul{list-style:none;color:#94a3b8;font-size:11px;line-height:1.6}
.footer{text-align:center;color:#475569;font-size:11px;margin-top:8px}
.p0{color:#fb7185;font-weight:700}.p1{color:#fbbf24;font-weight:700}.p2{color:#22d3ee}</style></head><body>
