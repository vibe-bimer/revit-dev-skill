<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Revit 开发系统拓扑图 V4 Light</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'JetBrains Mono',monospace;background:#f8fafc;color:#0f172a;padding:20px}
  .container{max-width:1600px;margin:0 auto}
  .header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:#0ea5e9;animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.35}}
  h1{font-size:18px;color:#0f172a}
  .sub{font-size:12px;color:#475569;margin-bottom:12px}
  .diagram{background:rgba(255,255,255,.95);border:1px solid #cbd5e1;border-radius:14px;padding:12px;overflow:hidden;box-shadow:0 8px 30px rgba(15,23,42,.08)}
  svg{width:100%;display:block}
  .footer{margin-top:8px;text-align:center;font-size:11px;color:#64748b}
  .white{fill:#0f172a}
</style>
</head>
<body>
<div class="container">
  <div class="header"><div class="dot"></div><h1>Revit 二次开发工作流架构图 V4 · Light</h1></div>
  <div class="sub">更亮的版本：减少压暗感，保留主流程、10 条红线、P0/P1/P2 和 CI/CD 目标态</div>

  <div class="diagram">
    <svg viewBox="0 0 1560 1220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
        <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#0ea5e9"/></marker>
        <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#10b981"/></marker>
        <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b"/></marker>
        <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f43f5e"/></marker>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.7"/></pattern>
      </defs>

      <rect x="0" y="0" width="1560" height="1220" fill="#f8fafc"/>
      <rect x="0" y="0" width="1560" height="1220" fill="url(#grid)"/>
      <rect x="16" y="16" width="1528" height="1188" rx="16" fill="rgba(255,255,255,.55)" stroke="#e2e8f0" stroke-width="1.2" stroke-dasharray="8,4"/>
      <text x="32" y="36" fill="#f59e0b" font-size="10" font-weight="700">Revit Dev Infra Region</text>

      <!-- Top row -->
      <g>
        <rect x="40" y="60" width="150" height="80" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
        <text x="115" y="91" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Roky</text>
        <text x="115" y="110" text-anchor="middle" fill="#64748b" font-size="9">Feishu DM</text>
      </g>
      <g>
        <rect x="220" y="45" width="220" height="110" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
        <text x="330" y="74" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Hermes</text>

        <text x="330" y="108" text-anchor="middle" fill="#64748b" font-size="9">触发 build / 审核门禁</text>
        <text x="330" y="126" text-anchor="middle" fill="#f43f5e" font-size="8">红线：不直改源码</text>
      </g>
      <g>
        <rect x="470" y="45" width="200" height="110" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
        <text x="570" y="74" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Claude Code</text>
        <text x="570" y="92" text-anchor="middle" fill="#64748b" font-size="9">编码 + 代码审查</text>
        <text x="570" y="108" text-anchor="middle" fill="#64748b" font-size="9">仅受控委托</text>
        <text x="570" y="126" text-anchor="middle" fill="#f59e0b" font-size="8">ACP 链路待解除 429</text>

        <text x="810" y="92" text-anchor="middle" fill="#64748b" font-size="9">~/revit-plugin-dev</text>
        <text x="810" y="108" text-anchor="middle" fill="#64748b" font-size="9">git push 源头 / build.sh</text>
        <text x="810" y="126" text-anchor="middle" fill="#64748b" font-size="8">只负责思考与提交，不本地编译 WPF</text>
      </g>
      <g>
        <rect x="950" y="45" width="240" height="110" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="1070" y="74" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">GitLab CE</text>
        <text x="1070" y="92" text-anchor="middle" fill="#64748b" font-size="9">source hub / sync hub</text>
        <text x="1070" y="108" text-anchor="middle" fill="#64748b" font-size="9">.gitlab-ci.yml + Runner 目标态</text>
        <text x="1070" y="126" text-anchor="middle" fill="#f59e0b" font-size="8">当前：无 CI/CD</text>
      </g>
      <g>
        <rect x="1220" y="45" width="300" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="1370" y="74" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Windows Build Host</text>
        <text x="1370" y="92" text-anchor="middle" fill="#64748b" font-size="9">C:/Projects / build + deploy</text>
        <text x="1370" y="108" text-anchor="middle" fill="#64748b" font-size="9">只 pull + 编译 + Copy-Item</text>
        <text x="1370" y="126" text-anchor="middle" fill="#f59e0b" font-size="8">Revit 2026 smoke 手工验证</text>
      </g>

      <!-- Support row -->
      <g>
        <rect x="240" y="215" width="300" height="100" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="390" y="242" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Knowledge Base</text>
        <text x="390" y="260" text-anchor="middle" fill="#64748b" font-size="9">~/wiki-revit/raw · entities</text>
        <text x="390" y="276" text-anchor="middle" fill="#64748b" font-size="9">skills/revit / GBrain 索引</text>

      </g>
      <g>

        <text x="1110" y="260" text-anchor="middle" fill="#64748b" font-size="9">Runner → build → test → deploy</text>
        <text x="1110" y="276" text-anchor="middle" fill="#64748b" font-size="9">替代纯手工 build.sh</text>
        <text x="1110" y="292" text-anchor="middle" fill="#f59e0b" font-size="8">前提：Windows Runner 落地</text>
      </g>
      <g>
        <rect x="1220" y="205" width="300" height="80" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="1370" y="233" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Revit Addins 2026</text>
        <text x="1370" y="251" text-anchor="middle" fill="#64748b" font-size="9">SuperRoky.addin / FmRoky.addin</text>
        <text x="1370" y="267" text-anchor="middle" fill="#64748b" font-size="9">DLL + icon + config</text>
      </g>
      <g>
        <rect x="1220" y="320" width="300" height="90" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="1370" y="347" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Revit 2026</text>
        <text x="1370" y="365" text-anchor="middle" fill="#64748b" font-size="9">启动 / 加载 / 点击 smoke</text>
        <text x="1370" y="381" text-anchor="middle" fill="#64748b" font-size="9">验证命令、UI、日志</text>
      </g>

      <!-- Governance panels -->
      <g>
        <rect x="40" y="465" width="470" height="280" rx="10" fill="#ffffff" stroke="#f43f5e" stroke-width="1.5"/>
        <text x="275" y="493" text-anchor="middle" fill="#f43f5e" font-size="12" font-weight="700">10 条红线总览</text>
        <line x1="56" y1="505" x2="494" y2="505" stroke="#f43f5e" stroke-width="0.7" stroke-dasharray="3,3"/>
        <g font-size="8" fill="#334155">
          <text x="58" y="528">1. 需求先过 spec 闸门</text>
          <text x="58" y="548">2. Hermes 不直接改 Revit 源码</text>
          <text x="58" y="568">3. 手动 commit 优先，auto-commit 限 2 次</text>
          <text x="58" y="588">4. SuperRoky 只走 build.sh</text>
          <text x="58" y="608">5. FmRoky 只走 build-fmroky.sh</text>
          <text x="58" y="628">6. git 失败立即中止</text>
          <text x="58" y="648">7. git 失败默认禁止 scp 绕过</text>
          <text x="58" y="668">8. 写代码前先查 Wiki/API</text>
          <text x="58" y="688">9. 图标三处同步</text>
          <text x="58" y="708">10. 修完 bug 要回收踩坑</text>
        </g>
      </g>

      <g>
        <rect x="540" y="465" width="470" height="280" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="775" y="493" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">P0 / P1 / P2 治理分区</text>
        <line x1="556" y1="505" x2="994" y2="505" stroke="#f59e0b" stroke-width="0.7" stroke-dasharray="3,3"/>
        <g font-size="8">
          <text x="556" y="530" fill="#f43f5e" font-weight="700">P0</text>
          <text x="592" y="530" fill="#334155">阻断发布：无 Runner、build 失败、DLL 锁、git 断链</text>
          <text x="556" y="552" fill="#f59e0b" font-weight="700">P1</text>
          <text x="592" y="552" fill="#334155">高优先级：无 spec、commit 语义化破窗、无自动测试、手工 smoke 过多</text>
          <text x="556" y="574" fill="#0ea5e9" font-weight="700">P2</text>
          <text x="592" y="574" fill="#334155">优化项：文档结构、知识库索引、图表排版、分支治理</text>
        </g>
        <rect x="556" y="602" width="408" height="96" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="760" y="626" text-anchor="middle" fill="#475569" font-size="9">原则：问题要挂回受影响模块，不要堆成孤岛</text>
        <text x="760" y="644" text-anchor="middle" fill="#475569" font-size="9">目标：从“人工救火”转向“门禁治理”</text>
        <text x="760" y="662" text-anchor="middle" fill="#475569" font-size="9">落地：Runner / spec / 审计 / smoke / 归档</text>
      </g>

      <g>
        <rect x="1040" y="465" width="480" height="280" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
        <text x="1280" y="493" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">当前态 → 目标态</text>
        <line x1="1056" y1="505" x2="1504" y2="505" stroke="#10b981" stroke-width="0.7" stroke-dasharray="3,3"/>
        <g font-size="8" fill="#334155">
          <text x="1058" y="532">当前：Hermes 编排 + Claude Code 受控委托 + Windows 手工 smoke</text>
          <text x="1058" y="552">当前：GitLab 仅做 sync hub，无 Runner</text>
          <text x="1058" y="572">目标：Runner 触发 build / test / deploy / notify</text>
          <text x="1058" y="592">目标：spec 落地到 docs/plans，commit 语义化恢复</text>
          <text x="1058" y="612">目标：问题面板可追踪，红线变成可审计门禁</text>
        </g>
        <rect x="1056" y="640" width="448" height="66" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
        <text x="1280" y="666" text-anchor="middle" fill="#f59e0b" font-size="9">重点：把“建议新增”改成“明确架构层”，但先补 Runner 和 spec 门禁</text>
        <text x="1280" y="684" text-anchor="middle" fill="#64748b" font-size="8">别把问题写成口号，图里要看得出谁负责、谁阻断、谁能放行</text>
      </g>

      <path d="M 1070 155 L 1070 214" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>
      <text x="1085" y="184" fill="#10b981" font-size="8">CI/CD</text>
