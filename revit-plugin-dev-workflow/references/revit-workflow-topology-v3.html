<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Revit 开发系统拓扑图 V3</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'JetBrains Mono',monospace;background:#020617;color:#e2e8f0;padding:20px}
  .container{max-width:1580px;margin:0 auto}
  .header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:#22d3ee;animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.35}}
  h1{font-size:18px;color:#fff}
  .sub{font-size:12px;color:#94a3b8;margin-bottom:12px}
  .diagram{background:rgba(15,23,42,.55);border:1px solid #1e293b;border-radius:14px;padding:12px;overflow:hidden}
  svg{width:100%;display:block}
  .footer{margin-top:8px;text-align:center;font-size:11px;color:#64748b}
  .tag{font-size:8px;fill:#020617;font-weight:700}
  .tiny{font-size:8px;fill:#94a3b8}
  .white{fill:#fff}
</style>
</head>
<body>
<div class="container">
  <div class="header"><div class="dot"></div><h1>Revit 二次开发工作流架构图 V3</h1></div>
  <div class="sub">2026-04-26 更新版：补齐 10 条红线、Claude Code 链路、CI/CD 目标态，以及 P0 / P1 / P2 治理分区</div>

  <div class="diagram">

      <rect x="0" y="0" width="1560" height="1220" fill="#020617"/>
      <rect x="0" y="0" width="1560" height="1220" fill="url(#grid)"/>

      <text x="810" y="108" text-anchor="middle" class="tiny">git push 源头 / build.sh</text>
      <text x="810" y="126" text-anchor="middle" fill="#94a3b8" font-size="8">只负责思考与提交，不本地编译 WPF</text>
